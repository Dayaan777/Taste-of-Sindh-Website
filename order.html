<!DOCTYPE html>
<html>

<head>
    <title>Order Page</title>
</head>

<body bgcolor="#f5f5f5">

<br><br>

<center>

    <h1>🛒 Place Your Order</h1>

    <p>Fill the details below to order your food</p>

    <br><br>
    
    <table cellpadding="10">

        <tr>
            <td>Name:</td>
            <td>
                <input type="text" placeholder="Enter your name">
            </td>
        </tr>

        <tr>
            <td>Phone:</td>
            <td>
                <input type="text" placeholder="Enter phone number">
            </td>
        </tr>

        <tr>
            <td>Address:</td>
            <td>
                <textarea placeholder="Enter delivery address"></textarea>
            </td>
        </tr>

        <tr>
            <td>Food Item:</td>
            <td>
                <input type="text" placeholder="Enter food item">
            </td>
        </tr>

    </table>

    <br>

    <button>Confirm Order</button>

</center>

</body>
</html>
